# Integration-test stack — spins up MinIO so the S3StorageAdapter can exercise
# a real S3-compatible endpoint instead of relying on mocks. Used by the
# `test-integration` Makefile target.
#
#   docker compose -f packages/backend/docker-compose.test.yml up -d
#   CI_INTEGRATION=1 npx jest src/__tests__/integration/s3Adapter.real.test.ts
#   docker compose -f packages/backend/docker-compose.test.yml down
#
# Credentials are intentionally the upstream defaults (`minioadmin`/`minioadmin`)
# because this stack is throwaway and never exposed beyond localhost.
services:
  minio:
    image: minio/minio:latest
    container_name: drk-test-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 15

  # One-shot sidecar that waits for MinIO to be live, then ensures the test
  # bucket exists. Using `mc` keeps the bucket-create idempotent across runs.
  createbucket:
    image: minio/mc:latest
    container_name: drk-test-minio-bucket-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/drk-test;
      mc anonymous set none local/drk-test;
      echo 'bucket drk-test ready';
      "
