# Release workflow — fires on any v* tag.
#
# Builds two products in parallel, both multi-arch (amd64+arm64), both
# pushed to Docker Hub:
#
#   - Standalone backend → gozippy/dockerrescuekit:standalone-<tag>
#                          gozippy/dockerrescuekit:standalone-latest
#   - Marketplace extension → gozippy/dockerrescuekit:<tag-without-v>
#                             gozippy/dockerrescuekit:latest
#
# Then runs Trivy on each pushed image and uploads SARIF to the Security tab.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME  — Docker Hub login
#   DOCKERHUB_TOKEN     — Docker Hub access token (NOT the password)
name: Release Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: standalone
            dockerfile: packages/backend/Dockerfile
            tag_versioned: standalone-${{ github.ref_name }}
            tag_latest: standalone-latest
          - product: extension
            dockerfile: Dockerfile
            # ref_name is e.g. "v1.1.0"; the extension product strips the
            # leading "v" so its primary tag is the bare semver.
            tag_versioned: ${{ github.ref_name }}
            tag_latest: latest
    outputs:
      # Surfacing per-matrix outputs is awkward; trivy-scan computes refs
      # itself from the same matrix below.
      ref: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute versioned tag (strip leading v for extension)
        id: tag
        run: |
          # The extension wants the bare semver (1.1.0), not v1.1.0.
          # Standalone keeps its "standalone-" prefix including the v for
          # backwards-compatibility with anyone pinning the previous scheme.
          if [ "${{ matrix.product }}" = "extension" ]; then
            ver="${{ github.ref_name }}"
            ver="${ver#v}"   # 1.1.0
            echo "versioned=$ver" >> "$GITHUB_OUTPUT"
            echo "image-ref=gozippy/dockerrescuekit:$ver" >> "$GITHUB_OUTPUT"
          else
            echo "versioned=${{ matrix.tag_versioned }}" >> "$GITHUB_OUTPUT"
            echo "image-ref=gozippy/dockerrescuekit:${{ matrix.tag_versioned }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            gozippy/dockerrescuekit:${{ steps.tag.outputs.versioned }}
            gozippy/dockerrescuekit:${{ matrix.tag_latest }}
          cache-from: type=gha,scope=${{ matrix.product }}
          cache-to: type=gha,mode=max,scope=${{ matrix.product }}

      - name: Run Trivy vulnerability scanner on pushed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tag.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.product }}-${{ github.ref_name }}
