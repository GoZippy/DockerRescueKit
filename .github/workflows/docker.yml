# Release workflow — fires on any v* tag.
# Builds a multi-arch backend image, pushes it to Docker Hub under the
# tag name AND `:latest`, then runs Trivy and uploads SARIF results so
# vulnerabilities show up in the GitHub Security tab.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME  — Docker Hub login
#   DOCKERHUB_TOKEN     — Docker Hub access token (NOT the password)
name: Release Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  security-events: write   # required for upload-sarif

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.meta.outputs.image-ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image reference
        id: meta
        run: |
          echo "image-ref=dockerrescuekit/backend:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            dockerrescuekit/backend:${{ github.ref_name }}
            dockerrescuekit/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Run Trivy vulnerability scanner on pushed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ github.ref_name }}
