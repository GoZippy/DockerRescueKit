# Release workflow — fires on any v* tag.
#
# Builds two products in parallel, both multi-arch (amd64+arm64), both
# pushed to Docker Hub AND Amazon ECR:
#
#   - Standalone backend → gozippy/dockerrescuekit:standalone-<tag>
#                          gozippy/dockerrescuekit:standalone-latest
#                          <account>.dkr.ecr.<region>.amazonaws.com/dockerrescuekit-standalone:<tag>
#                          <account>.dkr.ecr.<region>.amazonaws.com/dockerrescuekit-standalone:latest
#   - Marketplace extension → gozippy/dockerrescuekit:<tag-without-v>
#                             gozippy/dockerrescuekit:latest
#                             <account>.dkr.ecr.<region>.amazonaws.com/dockerrescuekit:<tag>
#                             <account>.dkr.ecr.<region>.amazonaws.com/dockerrescuekit:latest
#
# Then runs Trivy on each pushed image and uploads SARIF to the Security tab.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME  — Docker Hub login
#   DOCKERHUB_TOKEN     — Docker Hub access token (NOT the password)
#   AWS_ACCOUNT_ID      — 12-digit AWS account ID
#   AWS_REGION          — e.g. us-east-1
#   AWS_ROLE_TO_ASSUME  — ARN of the IAM role for GitHub OIDC (with ecr:* permissions)
name: Release Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write      # Required for GitHub OIDC → AWS STS
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: standalone
            dockerfile: packages/backend/Dockerfile
            tag_versioned: standalone-${{ github.ref_name }}
            tag_latest: standalone-latest
            ecr_repo: dockerrescuekit-standalone
          - product: extension
            dockerfile: Dockerfile
            # ref_name is e.g. "v1.1.0"; the extension product strips the
            # leading "v" so its primary tag is the bare semver.
            tag_versioned: ${{ github.ref_name }}
            tag_latest: latest
            ecr_repo: dockerrescuekit
    outputs:
      ref: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: tag
        run: |
          # Docker Hub tags
          if [ "${{ matrix.product }}" = "extension" ]; then
            DH_VERSIONED="${{ github.ref_name }}"
            DH_VERSIONED="${DH_VERSIONED#v}"   # strip leading v → 1.1.0
          else
            DH_VERSIONED="${{ matrix.tag_versioned }}"
          fi
          DH_LATEST="${{ matrix.tag_latest }}"
          DH_REGISTRY="gozippy/dockerrescuekit"

          # ECR tags — same versioning scheme, different registry
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          ECR_REPO="${{ matrix.ecr_repo }}"

          # For ECR, extension also strips v; standalone keeps the v in the
          # tag for backwards compatibility.
          if [ "${{ matrix.product }}" = "extension" ]; then
            ECR_VERSIONED="$DH_VERSIONED"
          else
            ECR_VERSIONED="$DH_VERSIONED"
          fi
          ECR_LATEST="$DH_LATEST"

          # Output all 4 registry/repo:tag combos
          echo "dh_versioned=${DH_REGISTRY}:${DH_VERSIONED}" >> "$GITHUB_OUTPUT"
          echo "dh_latest=${DH_REGISTRY}:${DH_LATEST}" >> "$GITHUB_OUTPUT"
          echo "ecr_versioned=${ECR_REGISTRY}/${ECR_REPO}:${ECR_VERSIONED}" >> "$GITHUB_OUTPUT"
          echo "ecr_latest=${ECR_REGISTRY}/${ECR_REPO}:${ECR_LATEST}" >> "$GITHUB_OUTPUT"

          # Trivy scans the Docker Hub versioned tag
          echo "image-ref=${DH_REGISTRY}:${DH_VERSIONED}" >> "$GITHUB_OUTPUT"

      - name: Build and push to Docker Hub + Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tag.outputs.dh_versioned }}
            ${{ steps.tag.outputs.dh_latest }}
            ${{ steps.tag.outputs.ecr_versioned }}
            ${{ steps.tag.outputs.ecr_latest }}
          cache-from: type=gha,scope=${{ matrix.product }}
          cache-to: type=gha,mode=max,scope=${{ matrix.product }}

      - name: Run Trivy vulnerability scanner on pushed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tag.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.product }}-${{ github.ref_name }}
