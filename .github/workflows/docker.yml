# Release workflow — fires on any v* tag.
#
# Builds two products in parallel, both multi-arch (amd64+arm64). Always
# pushes to Docker Hub; pushes to Amazon ECR ONLY when AWS_ROLE_TO_ASSUME
# is set as a repo secret (ECR is optional bonus, not a release blocker).
#
#   - Standalone backend → gozippy/dockerrescuekit:standalone-<tag>
#                          gozippy/dockerrescuekit:standalone-latest
#                          [optional] <account>.dkr.ecr.<region>.amazonaws.com/dockerrescuekit-standalone:<tag>
#   - Marketplace extension → gozippy/dockerrescuekit:<tag-without-v>
#                             gozippy/dockerrescuekit:latest
#                             [optional] <account>.dkr.ecr.<region>.amazonaws.com/dockerrescuekit:<tag>
#
# Then runs Trivy on each pushed image and uploads SARIF to the Security tab.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME  — Docker Hub login
#   DOCKERHUB_TOKEN     — Docker Hub access token (NOT the password)
#
# Optional repo secrets (ECR mirror):
#   AWS_ACCOUNT_ID      — 12-digit AWS account ID
#   AWS_REGION          — e.g. us-east-1
#   AWS_ROLE_TO_ASSUME  — ARN of the IAM role for GitHub OIDC (with ecr:* permissions)
#
# Without the AWS secrets the ECR steps are SKIPPED (not failed) and the
# workflow still ships to Docker Hub.
name: Release Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write      # Required for GitHub OIDC → AWS STS
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: standalone
            dockerfile: packages/backend/Dockerfile
            tag_versioned: standalone-${{ github.ref_name }}
            tag_latest: standalone-latest
            ecr_repo: dockerrescuekit-standalone
          - product: extension
            dockerfile: Dockerfile
            # ref_name is e.g. "v1.1.0"; the extension product strips the
            # leading "v" so its primary tag is the bare semver.
            tag_versioned: ${{ github.ref_name }}
            tag_latest: latest
            ecr_repo: dockerrescuekit
    outputs:
      ref: ${{ github.ref_name }}
    # ECR publishing is gated on the AWS role secret being present. Without
    # it, the AWS/ECR steps below are SKIPPED (not failed) and the workflow
    # still ships to Docker Hub. This prevents missing AWS secrets from
    # cascading into "Trivy can't find the image" symptoms downstream.
    env:
      ENABLE_ECR: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials (GitHub OIDC)
        if: env.ENABLE_ECR == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        if: env.ENABLE_ECR == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: tag
        run: |
          # Docker Hub tags
          if [ "${{ matrix.product }}" = "extension" ]; then
            DH_VERSIONED="${{ github.ref_name }}"
            DH_VERSIONED="${DH_VERSIONED#v}"   # strip leading v → 1.1.0
          else
            DH_VERSIONED="${{ matrix.tag_versioned }}"
          fi
          DH_LATEST="${{ matrix.tag_latest }}"
          DH_REGISTRY="gozippy/dockerrescuekit"

          echo "dh_versioned=${DH_REGISTRY}:${DH_VERSIONED}" >> "$GITHUB_OUTPUT"
          echo "dh_latest=${DH_REGISTRY}:${DH_LATEST}" >> "$GITHUB_OUTPUT"

          # ECR tags — only emitted when ECR is enabled. The multi-arch push
          # step interpolates these on conditional newlines, so empty strings
          # here become no-ops in the tag list.
          if [ "${ENABLE_ECR}" = "true" ]; then
            ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
            ECR_REPO="${{ matrix.ecr_repo }}"
            echo "ecr_versioned=${ECR_REGISTRY}/${ECR_REPO}:${DH_VERSIONED}" >> "$GITHUB_OUTPUT"
            echo "ecr_latest=${ECR_REGISTRY}/${ECR_REPO}:${DH_LATEST}" >> "$GITHUB_OUTPUT"
          else
            echo "ecr_versioned=" >> "$GITHUB_OUTPUT"
            echo "ecr_latest=" >> "$GITHUB_OUTPUT"
          fi

          # Trivy scans the local pre-push image — see Build step below
          echo "image-ref=${DH_REGISTRY}:${DH_VERSIONED}" >> "$GITHUB_OUTPUT"

      # Build a local single-arch image FIRST so Trivy can gate on it before
      # we publish anything. Multi-arch buildx-push happens only after the
      # scan passes, so a CRITICAL CVE never reaches Docker Hub or ECR.
      - name: Build local image for scan (amd64 only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: drk-scan:${{ matrix.product }}-${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.product }}
          cache-to: type=gha,mode=max,scope=${{ matrix.product }}

      # GATING scan — CRITICAL only. Build fails if any unfixed CRITICAL
      # is present. HIGH does not gate (see SARIF step below for visibility).
      - name: Trivy scan local image — GATE on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: drk-scan:${{ matrix.product }}-${{ github.ref_name }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      # Reporting scan — CRITICAL+HIGH into SARIF for the GitHub Security tab.
      # Non-gating (exit-code:0) so this never fails the workflow on its own;
      # the gate is the previous step.
      - name: Trivy scan local image — SARIF report (CRITICAL+HIGH)
        if: always()  # still publish findings even if the gate above failed
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: drk-scan:${{ matrix.product }}-${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()  # publish findings even if the gate failed above
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.product }}-${{ github.ref_name }}

      # Trivy passed → safe to multi-arch publish. Buildx reuses the cache
      # from the previous build step so this is cheap. The ECR tags are
      # empty strings when ECR is disabled — build-push-action ignores
      # blank lines in the tags list, so the same step works in both modes.
      - name: Build and push (multi-arch) to Docker Hub + Amazon ECR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tag.outputs.dh_versioned }}
            ${{ steps.tag.outputs.dh_latest }}
            ${{ steps.tag.outputs.ecr_versioned }}
            ${{ steps.tag.outputs.ecr_latest }}
          cache-from: type=gha,scope=${{ matrix.product }}
          cache-to: type=gha,mode=max,scope=${{ matrix.product }}
