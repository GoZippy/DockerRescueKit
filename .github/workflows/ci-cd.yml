name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present

  test:
    # Product targets Windows/Mac Docker Desktop users, so run tests on all
    # three platforms. better-sqlite3 ships native bindings that get rebuilt
    # per-platform during `npm ci` — this matrix catches breakage there.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=@docker-rescue-kit/shared
      - run: npm test --workspace=@docker-rescue-kit/backend -- --coverage
      # cli and mcp are shipped workspace packages with their own jest suites —
      # exercise them too so a regression there fails CI (previously untested).
      - run: npm test --workspace=@docker-rescue-kit/cli
      - run: npm test --workspace=@docker-rescue-kit/mcp
      - uses: codecov/codecov-action@v7
        if: always() && runner.os == 'Linux'
        with:
          files: ./packages/backend/coverage/lcov.info

  # Runtime-dependency supply-chain gate.
  # Fails the build on HIGH+ advisories in production deps so a vulnerable
  # transitive dep can never reach a release tag. Dev advisories (jest,
  # eslint, etc.) are surfaced via Dependabot weekly PRs and do not gate.
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit (production deps only, fail on HIGH+)
        run: npm audit --audit-level=high --omit=dev

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            packages/extension/dist
            packages/backend/dist

  # Smoke-build the image on every push/PR after tests pass.
  # Catches breakage like the gid-1000 collision we hit on 2026-04-30
  # (the `node` base image owns 1000, so `addgroup -g 1000 drk` fails).
  # Does NOT push — push happens in .github/workflows/docker.yml on tag.
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write   # required for github/codeql-action/upload-sarif
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build backend image (CI smoke)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/backend/Dockerfile
          push: false
          load: true
          tags: gozippy/dockerrescuekit:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # R7.4 — scan every PR build (docker.yml only scans on v* tag pushes).
      # GATE on CRITICAL only so unfixed CRITICAL CVEs cannot land on main.
      # HIGH is reported to the Security tab via the second scan below.
      - name: Trivy — GATE on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gozippy/dockerrescuekit:ci-${{ github.sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy — SARIF report (CRITICAL+HIGH, non-gating)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gozippy/dockerrescuekit:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-ci-${{ github.sha }}

  docker-image:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/backend/Dockerfile
          push: false
          tags: gozippy/dockerrescuekit:standalone-latest

  docker-desktop-extension:
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build backend (named for extension compose)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/backend/Dockerfile
          push: false
          tags: gozippy/dockerrescuekit:ci-${{ github.sha }}
          load: true
      - name: Build Docker Desktop Extension image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: gozippy/dockerrescuekit:latest
