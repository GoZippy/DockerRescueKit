# Docker Desktop Extension compose file — referenced by metadata.json.
# The extension runs only the backend; the UI is served as a static asset
# bundle by Docker Desktop from the `ui/` directory baked into the image.
# ${DESKTOP_PLUGIN_IMAGE} is injected by `docker extension install`.
#
# Socket convention:
# Backend writes drk.sock to /run/guest-services/drk.sock inside the
# container. Docker Desktop automatically bind-mounts an extension-scoped
# host VM directory onto /run/guest-services for any extension that
# declares `vm.exposes.socket` in metadata.json — we DO NOT redeclare
# that mount here. v1.2.5 hotfix: an earlier explicit declaration
# created a duplicate bind mount on install (Docker Desktop appends its
# own copy regardless), which caused `compose up -d` to fail with
# "mount target /run/guest-services already exists" and left the
# extension stuck "Offline" on every fresh install.

services:
  backend:
    image: ${DESKTOP_PLUGIN_IMAGE}
    environment:
      - NODE_ENV=production
      - DRK_TRANSPORT=socket
      - DRK_SOCKET_PATH=/run/guest-services/drk.sock
      - DRK_DATA_DIR=/data
    volumes:
      - drk-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.docker.desktop.extension.api.version: "0.3.4"

volumes:
  drk-data:
