# Docker Desktop Extension compose file — referenced by metadata.json.
# The extension runs only the backend; the UI is served as a static asset
# bundle by Docker Desktop from the `ui/` directory baked into the image.
# ${DESKTOP_PLUGIN_IMAGE} is injected by `docker extension install`.
#
# Mount convention (matches docker/volumes-backup-extension and others):
#   source: /run/guest-services/gozippy_dockerrescuekit  (host VM subdirectory)
#   target: /run/guest-services                          (inside container)
# Backend writes drk.sock to /run/guest-services/ inside the container,
# which resolves to /run/guest-services/gozippy_dockerrescuekit/drk.sock on
# the host. Docker Desktop reads the mount source + metadata.json vm.exposes.socket
# to discover and proxy the socket — no label override needed.

services:
  backend:
    image: ${DESKTOP_PLUGIN_IMAGE}
    environment:
      - NODE_ENV=production
      - DRK_TRANSPORT=socket
      - DRK_SOCKET_PATH=/run/guest-services/drk.sock
      - DRK_DATA_DIR=/data
    volumes:
      - drk-data:/data
      - /run/guest-services/gozippy_dockerrescuekit:/run/guest-services
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.docker.desktop.extension.api.version: "0.3.4"

volumes:
  drk-data:
